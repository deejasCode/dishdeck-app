version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: dishdeck
      POSTGRES_USER: dishdeck
      POSTGRES_PASSWORD: dishdeck123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/dishdeck
      SPRING_DATASOURCE_USERNAME: dishdeck
      SPRING_DATASOURCE_PASSWORD: dishdeck123

volumes:
  postgres_data: